<div class="login-container">
  <div class="login-background">
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="login-card glass">
    <div class="login-header">
      <div class="logo-icon">
        <lucide-icon name="package" [size]="32"></lucide-icon>
      </div>
      <h1>InvManager</h1>
      <p class="subtitle">Gestión Profesional de Inventarios</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      @if (errorMsg) {
        <div class="error-alert">
          <lucide-icon name="alert-triangle" [size]="16"></lucide-icon>
          <span>{{ errorMsg }}</span>
        </div>
      }

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-wrapper">
          <lucide-icon name="user" class="input-icon" [size]="18"></lucide-icon>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="admin@empresa.com"
            autocomplete="email"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <lucide-icon name="settings" class="input-icon" [size]="18"></lucide-icon>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            autocomplete="current-password"
          >
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="form.invalid || loading">
        @if (loading) {
          <lucide-icon name="refresh-cw" class="spin" [size]="18"></lucide-icon>
          <span>Iniciando sesión...</span>
        } @else {
          <span>Entrar al Sistema</span>
          <lucide-icon name="log-out" [size]="18"></lucide-icon>
        }
      </button>

      <div class="login-footer">
        <p>¿Olvidaste tu contraseña? <a href="#">Contactar soporte</a></p>
      </div>
    </form>
  </div>
</div>
